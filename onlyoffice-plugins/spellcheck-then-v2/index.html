<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpellChecker TH+EN (v2)</title>
    <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
    <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
    <link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css" />
    <link rel="stylesheet" href="styles.css?v=0.4.1" />
    <script type="text/javascript" src="scripts/trie.js?v=0.4.1"></script>
    <script type="text/javascript" src="scripts/tokenizer.js?v=0.4.1"></script>
    <script type="text/javascript" src="scripts/code.js?v=0.4.1"></script>
  </head>
  <body>
    <div class="tscRoot">
      <header class="tscHeader">
        <div class="tscTitle">
          SpellChecker TH+EN <span class="tscBadge" id="tscVersion">v0.4.1</span>
        </div>
        <div class="tscHeaderRight">
          <button id="tscBtnClose" class="tscBtnGhost" type="button" title="ปิด">×</button>
        </div>
      </header>

      <section class="tscSection">
        <!-- <div class="tscHint" style="margin-bottom:8px;">
          Custom Trie FMM (ภาษาไทย) + Dict B+C
        </div> -->
        <div class="tscRow">
          <button id="tscBtnCheck" class="tscBtnPrimary" type="button" style="flex:1">ตรวจคำผิด</button>
        </div>
        <div id="tscStatus" class="tscStatus">พร้อม</div>
      </section>

      <section class="tscSection">
        <div class="tscLabel">ผลการตรวจ <span style="font-weight: 400; font-size: 11px; color: var(--tsc-muted);">(คลิกข้อความเพื่อหาคำถัดไปในเอกสาร)</span></div>
        <div id="tscResults" class="tscResults"></div>
      </section>
    </div>
  </body>
</html>
