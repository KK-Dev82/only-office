<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clipboard & Macros</title>
    <!-- ONLYOFFICE Plugin SDK (required for window.Asc.plugin.executeMethod/callCommand/etc.) -->
    <script type="text/javascript">
      window._doScriptErrors = [];
      window.onerror = function(msg, url, line, col, err) {
        window._doScriptErrors.push({ msg: msg, url: url, line: line });
        return false;
      };
    </script>
    <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
    <!-- ONLYOFFICE UI helpers + base styles -->
    <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
    <link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css" />
    <link rel="stylesheet" href="styles.css?v=0.1.30" />
    <!-- no bundler: load multiple scripts in order -->
    <!-- NOTE: do NOT use defer; SDK may call Asc.plugin.init before deferred scripts run -->
    <script type="text/javascript" src="core/ns.js?v=0.1.29"></script>
    <script type="text/javascript" src="core/util.js?v=0.1.29"></script>
    <script type="text/javascript" src="core/telemetry.js?v=0.1.29"></script>
    <script type="text/javascript" src="core/storage.js?v=0.1.29"></script>
    <script type="text/javascript" src="core/editor.js?v=0.1.29"></script>
    <script type="text/javascript" src="core/bus.js?v=0.1.29"></script>
    <script type="text/javascript" src="core/uiwatch.js?v=0.1.29"></script>
    <script type="text/javascript" src="core/tabs.js?v=0.1.29"></script>
    <script type="text/javascript" src="features/clipboard.js?v=0.1.29"></script>
    <script type="text/javascript" src="features/macros.js?v=0.1.29"></script>
    <!-- InputHelper typing/token detection (runs in background) -->
    <script type="text/javascript" src="features/inputhelper.js?v=0.1.29"></script>
    <!-- Space → nbsp: แทนที่ Space ด้วย non-breaking space เพื่อลดการขึ้นบรรทัดใหม่โดยไม่ตั้งใจ -->
    <script type="text/javascript" src="features/spaceToNbsp.js?v=0.1.29"></script>
    <script type="text/javascript" src="bootstrap.js?v=0.1.29"></script>
  </head>
  <body>
    <div class="doSimpleRoot">
      <div class="doSimpleHeader">
        <div>
          <div class="doSimpleTitle">Clipboard & Macros</div>
          <div class="doSimpleSub">
            Clipboard + Macros <span class="doSimpleBadge" id="pluginVersion">v?</span>
          </div>
        </div>
        <div class="doSimpleStatus" id="status">loading…</div>
      </div>

      <section class="doSimpleSection" aria-label="Clipboard">
        <div class="doSimpleSectionHeader">
          <div class="doSimpleSectionTitle">📋 Clipboard</div>
          <div class="doSimpleActions">
            <button id="clipOpenSystem" type="button">ดู Clipboard ระบบ</button>
            <button id="clipReload" type="button">Reload</button>
          </div>
        </div>
        <div class="doRow">
          <textarea id="clipText" class="doInput" rows="2" style="resize: vertical;" placeholder="ข้อความที่ต้องการเพิ่มใน Clipboard... (Enter = เพิ่ม, Shift+Enter = ขึ้นบรรทัดใหม่)"></textarea>
          <button id="clipAdd" type="button">เพิ่ม</button>
        </div>
        <div id="clipList" class="doList"></div>
      </section>

      <section class="doSimpleSection" aria-label="Macros">
        <div class="doSimpleSectionHeader">
          <div class="doSimpleSectionTitle">🧩 Macros</div>
          <div class="doSimpleActions">
            <button id="macroOpenSystem" type="button">ดู Macro ระบบ</button>
            <button id="macroOpenAdd" type="button">เพิ่ม Macro</button>
            <button id="macroReload" type="button">Reload</button>
          </div>
        </div>
        <div id="macroList" class="doList"></div>
      </section>

    </div>
  </body>
</html>
