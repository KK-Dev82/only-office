<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dictionary & Abbreviation</title>
    <!-- ONLYOFFICE Plugin SDK (required for window.Asc.plugin.executeMethod/callCommand/etc.) -->
    <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
    <!-- ONLYOFFICE UI helpers + base styles -->
    <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
    <link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css" />
    <link rel="stylesheet" href="core/styles.css?v=0.1.80" />
    <script type="text/javascript" src="core/ns.js?v=0.1.80"></script>
    <script type="text/javascript" src="core/util.js?v=0.1.80"></script>
    <script type="text/javascript" src="core/telemetry.js?v=0.1.80"></script>
    <script type="text/javascript" src="core/storage.js?v=0.1.80"></script>
    <script type="text/javascript" src="core/editor.js?v=0.1.80"></script>
    <script type="text/javascript" src="core/bus.js?v=0.1.80"></script>
    <script type="text/javascript" src="core/uiwatch.js?v=0.1.80"></script>
    <script type="text/javascript" src="core/tabs.js?v=0.1.80"></script>
    <script type="text/javascript" src="core/remote_sync.js?v=0.1.80"></script>
    <script type="text/javascript" src="features/dictionary.js?v=0.1.80"></script>
    <script type="text/javascript" src="features/abbreviation.js?v=0.1.80"></script>
    <script type="text/javascript" src="inputhelper.js?v=0.1.80"></script>

    <script type="text/javascript" src="bootstrap.js?v=0.1.80"></script>
  </head>
  <body>
    <div class="doRoot">
      <header class="doHeader">
        <div class="doHeaderLeft">
          <div class="doTitle">Language Tools</div>
          <div class="doBadges">
            <span class="doBadge" id="pluginVersion">v?</span>
          </div>
        </div>
        <div class="doHeaderRight">
          <div class="doStatus" id="status">loading…</div>
          <button class="doBtnGhost" id="btnSync" type="button">Sync</button>
        </div>
      </header>

      <main class="doMain">
        <div class="doMainSplit">
          <section class="doPane" id="pane-dictionary">
          <div class="doPanelHeader">
            <div class="doPanelTitle">📚 Dictionary</div>
            <div class="doPanelActions">
              <button id="dictOpenSystem" type="button">ดูคำศัพท์ระบบ</button>
            </div>
          </div>

          <div class="doRow">
            <input id="dictNewWord" class="doInput" placeholder="คำศัพท์" />
            <input id="dictNewDesc" class="doInput" placeholder="คำอธิบาย" />
            <button id="dictAdd" type="button">เพิ่มคำ</button>
          </div>

          <div class="doCard">
            <div class="doSubtitle">คำศัพท์ (Local)</div>
            <div id="dictSavedList" class="doList"></div>
          </div>
          </section>

          <div class="doDivider" aria-hidden="true"></div>

          <section class="doPane" id="pane-abbreviation">
          <div class="doPanelHeader">
            <div class="doPanelTitle">📝 คำย่อ</div>
            <div class="doPanelActions">
              <button id="abbrOpenSystem" type="button">ดูคำย่อระบบ</button>
            </div>
          </div>

          <div class="doRow">
            <input id="abbrShort" class="doInput" placeholder="คำย่อ" />
            <input id="abbrFull" class="doInput" placeholder="คำเต็ม" />
            <button id="abbrAdd" type="button">เพิ่มคำ</button>
          </div>

          <div class="doCard">
            <div class="doSubtitle">คำแนะนำ</div>
            <div id="abbrSuggest" class="doList"></div>
          </div>

          <div class="doCard">
            <div class="doSubtitle">รายการคำย่อ (Local)</div>
            <div id="abbrList" class="doList"></div>
          </div>
          </section>
        </div>

      </main>
    </div>
  </body>
</html>
